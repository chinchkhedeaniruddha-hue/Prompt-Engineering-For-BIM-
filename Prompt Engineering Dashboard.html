<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Engineering — Sheet Index</title>
<style>
  :root{
    --bg:#0E1A2B;
    --panel:#13233A;
    --panel-2:#172A45;
    --line:#2B4A6F;
    --line-soft:#1E3553;
    --accent:#E8C547;
    --accent-dim:#a98f3c;
    --text:#F4F1EA;
    --text-dim:#8FA3BC;
    --text-faint:#5A7090;
    --ok:#5FBF8A;
    --wip:#E8C547;
    --not:#5A7090;
    --radius:3px;
    --mono: 'Consolas','SFMono-Regular','Menlo',monospace;
    --sans: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:var(--bg);
    background-image:
      linear-gradient(var(--line-soft) 1px, transparent 1px),
      linear-gradient(90deg, var(--line-soft) 1px, transparent 1px);
    background-size:32px 32px;
    background-attachment:fixed;
    color:var(--text);
    font-family:var(--sans);
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  body.light{
    --bg:#F4F1EA;
    --panel:#FFFFFF;
    --panel-2:#FBFAF6;
    --line:#C9BFA6;
    --line-soft:#E5DFCD;
    --accent:#B8862F;
    --accent-dim:#8a6724;
    --text:#1C2430;
    --text-dim:#5A5240;
    --text-faint:#9A9180;
    --not:#9A9180;
  }

  /* ===== Top status bar (title block header) ===== */
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 24px;
    border-bottom:2px solid var(--line);
    background:var(--panel);
    position:sticky;
    top:0;
    z-index:50;
  }
  .topbar .brand{
    display:flex;
    align-items:baseline;
    gap:12px;
  }
  .brand .mark{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:2px;
    color:var(--accent);
    border:1px solid var(--accent);
    padding:3px 7px;
    border-radius:2px;
  }
  .brand h1{
    font-size:17px;
    font-weight:600;
    letter-spacing:0.3px;
  }
  .brand .sub{
    font-family:var(--mono);
    font-size:11px;
    color:var(--text-faint);
    letter-spacing:0.5px;
  }
  .topbar-actions{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .btn{
    font-family:var(--sans);
    font-size:12.5px;
    font-weight:600;
    letter-spacing:0.2px;
    padding:8px 14px;
    border-radius:var(--radius);
    border:1px solid var(--line);
    background:var(--panel-2);
    color:var(--text);
    cursor:pointer;
    transition:border-color .15s ease, background .15s ease, transform .1s ease;
    display:inline-flex;
    align-items:center;
    gap:6px;
  }
  .btn:hover{ border-color:var(--accent); }
  .btn:active{ transform:translateY(1px); }
  .btn.primary{
    background:var(--accent);
    color:#1A1404;
    border-color:var(--accent);
  }
  .btn.primary:hover{ background:var(--accent-dim); border-color:var(--accent-dim); }
  .btn.icon{ padding:8px 10px; }

  /* ===== Layout ===== */
  .layout{
    display:grid;
    grid-template-columns:340px 1fr;
    min-height:calc(100vh - 57px);
  }
  @media (max-width:880px){
    .layout{ grid-template-columns:1fr; }
    .sidebar{ position:static; max-height:none; }
  }

  /* ===== Sidebar: Sheet Index ===== */
  .sidebar{
    border-right:2px solid var(--line);
    background:var(--panel);
    padding:18px 14px;
    position:sticky;
    top:57px;
    height:calc(100vh - 57px);
    overflow-y:auto;
  }
  .sidebar::-webkit-scrollbar{ width:8px; }
  .sidebar::-webkit-scrollbar-thumb{ background:var(--line); border-radius:4px; }

  .index-label{
    font-family:var(--mono);
    font-size:10.5px;
    letter-spacing:2px;
    color:var(--text-faint);
    text-transform:uppercase;
    margin-bottom:10px;
    padding:0 4px;
  }

  .search-wrap{
    position:relative;
    margin-bottom:16px;
  }
  .search-wrap input{
    width:100%;
    padding:10px 12px 10px 34px;
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:var(--radius);
    color:var(--text);
    font-family:var(--sans);
    font-size:13px;
    outline:none;
    transition:border-color .15s ease;
  }
  .search-wrap input:focus{ border-color:var(--accent); }
  .search-wrap input::placeholder{ color:var(--text-faint); }
  .search-wrap svg{
    position:absolute;
    left:11px;
    top:50%;
    transform:translateY(-50%);
    width:14px;
    height:14px;
    stroke:var(--text-faint);
  }

  .progress-block{
    margin-bottom:18px;
    padding:12px 12px 14px;
    border:1px solid var(--line-soft);
    border-radius:var(--radius);
    background:var(--panel-2);
  }
  .progress-block .pb-top{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom:8px;
  }
  .progress-block .pb-label{
    font-family:var(--mono);
    font-size:10.5px;
    letter-spacing:1.5px;
    color:var(--text-faint);
    text-transform:uppercase;
  }
  .progress-block .pb-count{
    font-family:var(--mono);
    font-size:13px;
    color:var(--accent);
    font-weight:700;
  }
  .progress-track{
    height:6px;
    background:var(--line-soft);
    border-radius:3px;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    background:var(--accent);
    transition:width .35s ease;
    border-radius:3px;
  }

  .level-list{
    list-style:none;
    display:flex;
    flex-direction:column;
    gap:4px;
  }
  .level-item{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 10px;
    border-radius:var(--radius);
    border:1px solid transparent;
    cursor:pointer;
    transition:background .15s ease, border-color .15s ease;
  }
  .level-item:hover{
    background:var(--panel-2);
    border-color:var(--line-soft);
  }
  .level-item.active{
    background:var(--panel-2);
    border-color:var(--accent);
  }
  .level-item .lv-num{
    font-family:var(--mono);
    font-size:11px;
    color:var(--text-faint);
    width:26px;
    flex-shrink:0;
  }
  .level-item.active .lv-num{ color:var(--accent); }
  .level-item .lv-title{
    font-size:13px;
    color:var(--text);
    flex:1;
    line-height:1.3;
  }
  .status-dot{
    width:8px;
    height:8px;
    border-radius:50%;
    flex-shrink:0;
    background:var(--not);
  }
  .status-dot.in-progress{ background:var(--wip); }
  .status-dot.completed{ background:var(--ok); }

  .level-item.hidden{ display:none; }

  /* ===== Main panel: Title block / drawing sheet ===== */
  .main{
    padding:36px 44px;
    max-width:920px;
  }
  @media (max-width:600px){
    .main{ padding:22px 18px; }
  }

  .sheet{
    border:1px solid var(--line);
    border-radius:4px;
    background:var(--panel);
    overflow:hidden;
  }

  .sheet-header{
    padding:28px 32px 24px;
    border-bottom:1px dashed var(--line-soft);
  }
  .sheet-eyebrow{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:14px;
  }
  .sheet-eyebrow .num{
    font-family:var(--mono);
    font-size:12px;
    letter-spacing:1.5px;
    color:var(--accent);
    border:1px solid var(--accent);
    padding:4px 9px;
    border-radius:2px;
  }
  .sheet-eyebrow .status-pill{
    font-family:var(--mono);
    font-size:10.5px;
    letter-spacing:1px;
    text-transform:uppercase;
    padding:4px 9px;
    border-radius:2px;
    border:1px solid var(--line);
    color:var(--text-dim);
  }
  .sheet-title{
    font-size:28px;
    font-weight:700;
    letter-spacing:-0.3px;
    margin-bottom:10px;
    line-height:1.25;
  }
  .sheet-desc{
    font-size:14.5px;
    color:var(--text-dim);
    line-height:1.6;
    max-width:62ch;
  }

  .sheet-body{
    padding:26px 32px 30px;
    display:flex;
    flex-direction:column;
    gap:18px;
  }

  .sheet-meta{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:14px;
  }
  @media (max-width:560px){ .sheet-meta{ grid-template-columns:1fr; } }
  .meta-cell{
    border:1px solid var(--line-soft);
    border-radius:var(--radius);
    padding:12px 14px;
    background:var(--panel-2);
  }
  .meta-cell .meta-label{
    font-family:var(--mono);
    font-size:10px;
    letter-spacing:1.5px;
    color:var(--text-faint);
    text-transform:uppercase;
    margin-bottom:6px;
  }
  .meta-cell .meta-value{
    font-size:13px;
    color:var(--text);
    font-weight:600;
  }

  .sheet-actions{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    align-items:center;
    margin-top:6px;
  }

  .path-box{
    margin-top:4px;
    padding:12px 14px;
    background:var(--panel-2);
    border:1px solid var(--line-soft);
    border-radius:var(--radius);
    font-family:var(--mono);
    font-size:11.5px;
    color:var(--text-faint);
    word-break:break-all;
    line-height:1.5;
  }

  .status-set{
    display:flex;
    gap:8px;
    margin-top:4px;
  }
  .status-btn{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:0.5px;
    text-transform:uppercase;
    padding:7px 12px;
    border-radius:var(--radius);
    border:1px solid var(--line);
    background:transparent;
    color:var(--text-dim);
    cursor:pointer;
    transition:all .15s ease;
  }
  .status-btn:hover{ border-color:var(--text-dim); }
  .status-btn[data-active="true"]{
    border-color:currentColor;
  }
  .status-btn.s-not[data-active="true"]{ color:var(--not); border-color:var(--not); background:rgba(90,112,144,0.12); }
  .status-btn.s-wip[data-active="true"]{ color:var(--wip); border-color:var(--wip); background:rgba(232,197,71,0.12); }
  .status-btn.s-done[data-active="true"]{ color:var(--ok); border-color:var(--ok); background:rgba(95,191,138,0.12); }

  .toast{
    position:fixed;
    bottom:24px;
    left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--panel-2);
    border:1px solid var(--accent);
    color:var(--text);
    padding:11px 18px;
    border-radius:var(--radius);
    font-size:13px;
    opacity:0;
    pointer-events:none;
    transition:opacity .2s ease, transform .2s ease;
    z-index:100;
    box-shadow:0 8px 24px rgba(0,0,0,0.35);
  }
  .toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }

  .empty-state{
    text-align:center;
    padding:40px 20px;
    color:var(--text-faint);
    font-family:var(--mono);
    font-size:12px;
    letter-spacing:0.5px;
  }

  .footnote{
    margin-top:20px;
    font-family:var(--mono);
    font-size:10.5px;
    color:var(--text-faint);
    letter-spacing:0.3px;
    line-height:1.6;
  }

  svg{ display:block; }
</style>
</head>
<body>

  <div class="topbar">
    <div class="brand">
      <span class="mark">PE&#8226;LMS</span>
      <h1>Prompt Engineering</h1>
      <span class="sub">SHEET INDEX &nbsp;/&nbsp; 14 LEVELS</span>
    </div>
    <div class="topbar-actions">
      <button class="btn" id="openAllBtn" title="Open every level in a new tab">Open All Levels</button>
      <button class="btn icon" id="themeToggle" title="Toggle light / dark">
        <svg id="themeIcon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
    </div>
  </div>

  <div class="layout">

    <aside class="sidebar">
      <div class="index-label">Search sheets</div>
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Filter by level name…" autocomplete="off">
      </div>

      <div class="progress-block">
        <div class="pb-top">
          <span class="pb-label">Course progress</span>
          <span class="pb-count" id="progressCount">0 / 14</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" id="progressFill" style="width:0%"></div>
        </div>
      </div>

      <div class="index-label">Levels 0–13</div>
      <ul class="level-list" id="levelList"></ul>
    </aside>

    <main class="main">
      <div class="sheet" id="sheet">
        <!-- populated by JS -->
      </div>
      <div class="footnote" id="footnote"></div>
    </main>

  </div>

  <div class="toast" id="toast"></div>

<script>
(function(){

  // ===================================================================
  // DATA
  // ===================================================================
  const BASE_DIR = "D:\\ANI(DO NOT DELETE)\\02.EXERCISE PROJECT WORK DURING LEARNING\\WIP Prompt Engineering\\";

  const levels = [
    { id:0,  title:"The Foundation — What is AI",                                   desc:"Establishes the mental model: what large language models are, how they generate text, and why that matters before writing a single prompt." },
    { id:1,  title:"Prompt Fundamentals",                                            desc:"Core anatomy of a prompt — instruction, context, input data, and output indicator — and how each piece shapes the response." },
    { id:2,  title:"Context Engineering",                                            desc:"Techniques for supplying the right background information so the model reasons with the facts that matter, not assumptions." },
    { id:3,  title:"Prime Directives & Persona Prompting",                           desc:"Setting governing rules and stable personas that keep a model's behaviour consistent across a long session." },
    { id:4,  title:"Structured Prompting",                                           desc:"Using explicit structure — sections, delimiters, ordered steps — to make instructions unambiguous and easy to follow." },
    { id:5,  title:"Output Structuring & Constraints",                               desc:"Controlling exactly how a response is formatted: schemas, length limits, tone constraints, and structured data output." },
    { id:6,  title:"Few-Shot & Zero-Shot Prompting",                                 desc:"When to show examples versus rely on instructions alone, and how example quality changes output quality." },
    { id:7,  title:"Reasoning Strategies",                                           desc:"Chain-of-thought, self-consistency, and other techniques that improve multi-step reasoning accuracy." },
    { id:8,  title:"Advanced Strategies",                                            desc:"Combining prior techniques into compound prompting strategies for harder, multi-part problems." },
    { id:9,  title:"Prompt Debugging & Optimization",                                desc:"Diagnosing why a prompt underperforms and iterating systematically toward a reliable version." },
    { id:10, title:"AI Agents",                                                      desc:"Designing prompts for agentic workflows — tool use, multi-step planning, and autonomous task execution." },
    { id:11, title:"Model Selection & Tuning",                                       desc:"Choosing the right model for a task and adjusting parameters like temperature and top-p for desired behaviour." },
    { id:12, title:"Enterprise Prompting",                                           desc:"Scaling prompt design across teams and products: governance, consistency, and reusable prompt libraries." },
    { id:13, title:"Advanced Prompt Engineering + BIM + AI Agent Masterclass",        desc:"Capstone level applying advanced prompting and agent design directly to BIM and AEC workflows." },
  ].map(l => ({
    ...l,
    file: `Level ${l.id} — ${l.title.split(" — ")[0] === l.title ? l.title : l.title}.html`
  }));

  // Build exact filenames matching the source paths given (Level N — Title.html)
  const exactTitles = [
    "The Foundation What is AI",
    "Prompt Fundamentals",
    "Context Engineering",
    "Prime Directives & Persona Prompting",
    "Structured Prompting",
    "Output Structuring & Constraints",
    "Few-Shot & Zero-Shot Prompting",
    "Reasoning Strategies",
    "Advanced Strategies",
    "Prompt Debugging & Optimization",
    "AI Agents",
    "Model Selection & Tuning",
    "Enterprise Prompting",
    "Advanced Prompt Engineering + BIM + AI Agent Masterclass"
  ];
  levels.forEach((l,i) => {
    l.file = `Level ${l.id} — ${exactTitles[i]}.html`;
    l.fullPath = BASE_DIR + l.file;
    // file:// URL — encode path segments but keep backslashes converted to forward slashes
    l.fileUrl = "file:///" + encodeURI(l.fullPath.replace(/\\/g, "/")).replace(/#/g, "%23");
  });

  // ===================================================================
  // STATE
  // ===================================================================
  const STATUS = { NOT: "not", WIP: "wip", DONE: "done" };
  const STATUS_LABEL = { not: "Not Started", wip: "In Progress", done: "Completed" };

  let statusMap = loadJSON("pe_lms_status", {});
  let lastOpened = loadJSON("pe_lms_last", null);
  let activeId = lastOpened !== null && levels.some(l=>l.id===lastOpened) ? lastOpened : 0;
  let filterText = "";

  function loadJSON(key, fallback){
    try{
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    }catch(e){ return fallback; }
  }
  function saveJSON(key, val){
    try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){}
  }
  function getStatus(id){ return statusMap[id] || STATUS.NOT; }
  function setStatus(id, status){
    statusMap[id] = status;
    saveJSON("pe_lms_status", statusMap);
    renderList();
    renderProgress();
    if(id === activeId) renderSheet();
  }

  // ===================================================================
  // RENDER: Sidebar list
  // ===================================================================
  const levelListEl = document.getElementById("levelList");

  function renderList(){
    levelListEl.innerHTML = "";
    const q = filterText.trim().toLowerCase();
    let visibleCount = 0;

    levels.forEach(l => {
      const matches = !q || l.title.toLowerCase().includes(q) || String(l.id).includes(q);
      if(matches) visibleCount++;

      const li = document.createElement("li");
      li.className = "level-item" + (l.id === activeId ? " active" : "") + (matches ? "" : " hidden");
      li.setAttribute("data-id", l.id);

      const num = document.createElement("span");
      num.className = "lv-num";
      num.textContent = String(l.id).padStart(2,"0");

      const title = document.createElement("span");
      title.className = "lv-title";
      title.textContent = l.title;

      const dot = document.createElement("span");
      const st = getStatus(l.id);
      dot.className = "status-dot" + (st === STATUS.WIP ? " in-progress" : st === STATUS.DONE ? " completed" : "");

      li.appendChild(num);
      li.appendChild(title);
      li.appendChild(dot);

      li.addEventListener("click", () => {
        activeId = l.id;
        saveJSON("pe_lms_last", activeId);
        renderList();
        renderSheet();
      });

      levelListEl.appendChild(li);
    });

    if(visibleCount === 0){
      const empty = document.createElement("div");
      empty.className = "empty-state";
      empty.textContent = "NO SHEETS MATCH \u201c" + filterText + "\u201d";
      levelListEl.appendChild(empty);
    }
  }

  // ===================================================================
  // RENDER: Progress
  // ===================================================================
  function renderProgress(){
    const done = levels.filter(l => getStatus(l.id) === STATUS.DONE).length;
    document.getElementById("progressCount").textContent = `${done} / ${levels.length}`;
    document.getElementById("progressFill").style.width = (done / levels.length * 100) + "%";
  }

  // ===================================================================
  // RENDER: Main sheet (title block)
  // ===================================================================
  const sheetEl = document.getElementById("sheet");
  const footnoteEl = document.getElementById("footnote");

  function renderSheet(){
    const l = levels.find(x => x.id === activeId);
    if(!l){ sheetEl.innerHTML = ""; return; }
    const st = getStatus(l.id);

    sheetEl.innerHTML = `
      <div class="sheet-header">
        <div class="sheet-eyebrow">
          <span class="num">SHEET ${String(l.id).padStart(2,"0")} / 13</span>
          <span class="status-pill">${STATUS_LABEL[st]}</span>
        </div>
        <div class="sheet-title">${escapeHtml(l.title)}</div>
        <div class="sheet-desc">${escapeHtml(l.desc)}</div>
      </div>
      <div class="sheet-body">

        <div class="sheet-meta">
          <div class="meta-cell">
            <div class="meta-label">Level</div>
            <div class="meta-value">${l.id} of 13</div>
          </div>
          <div class="meta-cell">
            <div class="meta-label">Format</div>
            <div class="meta-value">Local HTML module</div>
          </div>
          <div class="meta-cell">
            <div class="meta-label">Status</div>
            <div class="meta-value">${STATUS_LABEL[st]}</div>
          </div>
        </div>

        <div>
          <div class="meta-label" style="margin-bottom:8px;">Mark status</div>
          <div class="status-set">
            <button class="status-btn s-not" data-status="not" data-active="${st==='not'}">Not Started</button>
            <button class="status-btn s-wip" data-status="wip" data-active="${st==='wip'}">In Progress</button>
            <button class="status-btn s-done" data-status="done" data-active="${st==='done'}">Completed</button>
          </div>
        </div>

        <div class="sheet-actions">
          <a class="btn primary" href="${l.fileUrl}" target="_blank" rel="noopener" id="openFileBtn">Open File ↗</a>
          <button class="btn" id="copyPathBtn">Copy File Path</button>
        </div>

        <div class="path-box">${escapeHtml(l.fullPath)}</div>
      </div>
    `;

    // status buttons
    sheetEl.querySelectorAll(".status-btn").forEach(btn => {
      btn.addEventListener("click", () => setStatus(l.id, btn.getAttribute("data-status")));
    });

    // open file -> remember as last opened
    document.getElementById("openFileBtn").addEventListener("click", () => {
      saveJSON("pe_lms_last", l.id);
      if(getStatus(l.id) === STATUS.NOT) setStatus(l.id, STATUS.WIP);
      showToast(`Opening Level ${l.id} — ${l.title}`);
    });

    // copy path
    document.getElementById("copyPathBtn").addEventListener("click", () => {
      copyToClipboard(l.fullPath);
      showToast("File path copied to clipboard");
    });

    footnoteEl.textContent = `LOCAL PATH RESOLUTION: this dashboard links directly to the .html files in the course folder. If a link does not open, your browser may block file:// navigation from another local file — use “Copy File Path” and paste it into your browser’s address bar instead.`;
  }

  function escapeHtml(s){
    return String(s)
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
  }

  function copyToClipboard(text){
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).catch(()=>fallbackCopy(text));
    } else {
      fallbackCopy(text);
    }
  }
  function fallbackCopy(text){
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.select();
    try{ document.execCommand("copy"); }catch(e){}
    document.body.removeChild(ta);
  }

  // ===================================================================
  // TOAST
  // ===================================================================
  let toastTimer = null;
  function showToast(msg){
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove("show"), 2600);
  }

  // ===================================================================
  // SEARCH
  // ===================================================================
  document.getElementById("searchInput").addEventListener("input", (e) => {
    filterText = e.target.value;
    renderList();
  });

  // ===================================================================
  // OPEN ALL LEVELS
  // ===================================================================
  document.getElementById("openAllBtn").addEventListener("click", () => {
    levels.forEach((l, i) => {
      setTimeout(() => window.open(l.fileUrl, "_blank"), i * 120);
    });
    showToast("Opening all 14 levels in new tabs…");
  });

  // ===================================================================
  // THEME TOGGLE
  // ===================================================================
  const themeToggle = document.getElementById("themeToggle");
  const themeIcon = document.getElementById("themeIcon");
  function applyTheme(light){
    document.body.classList.toggle("light", light);
    themeIcon.innerHTML = light
      ? '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>'
      : '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
  }
  let lightMode = loadJSON("pe_lms_theme_light", false);
  applyTheme(lightMode);
  themeToggle.addEventListener("click", () => {
    lightMode = !lightMode;
    saveJSON("pe_lms_theme_light", lightMode);
    applyTheme(lightMode);
  });

  // ===================================================================
  // INIT
  // ===================================================================
  renderList();
  renderProgress();
  renderSheet();

})();
</script>

</body>
</html>
